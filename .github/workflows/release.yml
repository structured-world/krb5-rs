name: Release

on:
  push:
    branches: [main]

jobs:
  release-pr:
    name: Create/update release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: MarcoIeni/release-plz-action@ef08e716ba77de37dd17b19d72ed171a2e1b63ab # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Publish to crates.io + GitHub Release
    # Run after release-pr to avoid race conditions.
    # release-plz release is idempotent — if Cargo.toml version matches
    # crates.io, this is a no-op. Only publishes when the Release PR
    # (which bumps the version) has been merged.
    needs: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: MarcoIeni/release-plz-action@ef08e716ba77de37dd17b19d72ed171a2e1b63ab # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
